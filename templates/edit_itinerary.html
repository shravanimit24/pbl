<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Itinerary - Travello</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            box-sizing: border-box;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        h1 {


            color: #000000;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            font-size: 2.5em;
            margin-bottom: 30px;
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        h2 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-container {
            background: linear-gradient(135deg, #ffffff 0%, #f0f4ff 100%);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            margin-bottom: 40px;
            border-top: 4px solid #667eea;
        }
        .form-container h2 {
            color: #502c49;
            margin-bottom: 25px;
        }
        input, select {
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }
        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: bold;
            font-size: 1.1em;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 8px #bac2e34d;
        }
        button {
            background: #2e3851;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
            transition: transform 0.2s ease;
        }
        button:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 15px rgba(243, 156, 18, 0.4);
        }
        .nav-buttons {
            text-align: center;
            margin-bottom: 20px;
        }
        .nav-buttons a {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 8px;
            margin: 5px;
            display: inline-block;
            transition: transform 0.2s ease;
        }
        .nav-buttons a:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.4);
        }
        .nav-buttons a.back-btn {
            background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%);
        }
        .nav-buttons a.back-btn:hover {
            box-shadow: 0 4px 10px rgba(149, 165, 166, 0.4);
        }
        .nav-buttons a.view-btn {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
        }
        .nav-buttons a.view-btn:hover {
            box-shadow: 0 4px 10px rgba(39, 174, 96, 0.4);
        }
    </style>
</head>
<body>
    <h1>✏️ Edit Itinerary</h1>

    <div class="container">
        <div class="nav-buttons">
            <a href="/itinerary/{{ itinerary.id }}" class="view-btn">👁️ View Itinerary</a>
            <a href="{{ url_for('itineraries.home') }}" class="back-btn">← Back to Home</a>
        </div>

        <div class="form-container">
            <h2>Modify Your Travel Plan</h2>
            <form action="{{ url_for('itineraries.update_basic_itinerary', itinerary_id=itinerary.id) }}" method="POST">
                <label for="title">Trip Title:</label>
                <input type="text" id="title" name="title" value="{{ itinerary.title }}" placeholder="e.g., Summer Vacay 2024" required>

                <label for="location">Destination Location:</label>
                <select id="location" name="location" required>
                    <option value="">Select a destination...</option>
                    {% for location_option in locations %}
                    <option value="{{ location_option }}" {% if location_option == itinerary.location %}selected{% endif %}>{{ location_option }}</option>
                    {% endfor %}
                </select>

                <label for="duration">Duration (days):</label>
                <input type="number" id="duration" name="duration" value="{{ itinerary.duration }}" min="1" max="30" required>

                <label for="participants">Number of Participants:</label>
                <input type="number" id="participants" name="participants" value="{{ itinerary.participants }}" min="0">

                <button type="submit">💾 Update Itinerary</button>
            </form>
        </div>
    </div>
</body>
</html>
