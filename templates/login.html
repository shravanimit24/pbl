<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Travello</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            box-sizing: border-box;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        h1 {
            color: #fff;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            font-size: 2.5em;
            margin-bottom: 30px;
            background: #619adb;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .form-container {
            background: linear-gradient(135deg, #ffffff 0%, #f0f4ff 100%);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            margin-bottom: 40px;
            border: 4px solid #667eea;
        }
        .form-container h2 {
            color: #2c3e50;
            margin-bottom: 25px;
            text-align: center;
        }
        input, select {
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }
        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: bold;
            font-size: 1.1em;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 8px rgba(102, 126, 234, 0.3);
        }
        button {
            background: #619adb;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
            transition: transform 0.2s ease;
        }
        button:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 15px rgba(102, 126, 234, 0.4);
        }
        .nav-links {
            text-align: center;
            margin-top: 20px;
        }
        .nav-links a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.05em;
            transition: color 0.2s ease;
        }
        .nav-links a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        .messages {
            background: #fdeaea;
            border-left: 4px solid #e74c3c;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .messages ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .messages li {
            color: #c0392b;
            padding: 8px 0;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <h1>🗺️ Welcome Back to Travello</h1>
    
    <div class="container">
        <div class="form-container">
            <h2>Sign In to Your Account</h2>
            
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="messages">
                        <ul>
                            {% for message in messages %}
                                <li>{{ message }}</li>
                            {% endfor %}
                        </ul>
                    </div>
                {% endif %}
            {% endwith %}
            
            <form method="POST">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>

                <button type="submit"> Login</button>
            </form>
            
            <div class="nav-links">
                <p>Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a></p>
            </div>
        </div>
    </div>
</body>
</html>
